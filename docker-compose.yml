version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scraper_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
  scraper:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scraper_db
    depends_on: [postgres]
    volumes: ["./data:/app/data"]
